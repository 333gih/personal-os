# Standalone GitHub repo (mirrored from personal-os): extension at repo root + ios/
name: iOS Build

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build PersonalOS (Simulator)
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Safari extension + auth bridge → ios/
        run: |
          npm run build:safari
          npm run sync:safari-ios
          npm run build:ios-bridge
          npm run sync:ios-bridge

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Prepare Xcode project
        working-directory: ios
        run: bash scripts/ci_ios_prepare.sh

      - name: Build for iOS Simulator
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project PersonalOS.xcodeproj \
            -scheme PersonalOS \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -derivedDataPath DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: personal-os-xcodebuild-log-${{ github.run_number }}
          path: ios/xcodebuild.log
          retention-days: 7
