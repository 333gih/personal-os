name: PersonalOS
options:
  bundleIdPrefix: com.personalos
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.5.18"
    CURRENT_PROJECT_VERSION: "30"

targets:
  PersonalOS:
    type: application
    platform: iOS
    sources:
      - path: PersonalOSApp
        excludes:
          - Resources/**
    preBuildScripts:
      - name: Validate extension auth bridge
        script: |
          set -e
          SRC="${SRCROOT}/PersonalOSApp/Resources/connect-bridge.js"
          if [ ! -f "${SRC}" ]; then
            echo "error: missing ${SRC} — run from story-tracker/: npm run build:ios-bridge && npm run sync:ios-bridge"
            exit 1
          fi
        basedOnDependencyAnalysis: false
    postCompileScripts:
      - name: Copy extension auth bridge
        script: |
          set -e
          SRC="${SRCROOT}/PersonalOSApp/Resources/connect-bridge.js"
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "${DEST}"
          cp "${SRC}" "${DEST}/connect-bridge.js"
        basedOnDependencyAnalysis: false
    settings:
      base:
        MARKETING_VERSION: "1.5.18"
        CURRENT_PROJECT_VERSION: "30"
        PRODUCT_NAME: Personal OS
        PRODUCT_BUNDLE_IDENTIFIER: com.personalos.story-tracker
        INFOPLIST_FILE: PersonalOSApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: PersonalOSApp/PersonalOSApp.entitlements
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: __CI_PROVISIONING_PROFILE__
          DEVELOPMENT_TEAM: __CI_TEAM_ID__
    dependencies:
      - target: StoryTrackerExtension
        embed: true
    scheme:
      testTargets: []

  StoryTrackerExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: StoryTrackerExtension
        excludes:
          - Resources/**
    preBuildScripts:
      - name: Validate Safari Resources
        script: |
          set -e
          SRC="${SRCROOT}/StoryTrackerExtension/Resources"
          if [ ! -f "${SRC}/manifest.json" ]; then
            echo "error: missing ${SRC}/manifest.json — run from story-tracker/: npm run build:safari && npm run sync:safari-ios"
            exit 1
          fi
        basedOnDependencyAnalysis: false
    postCompileScripts:
      - name: Copy Safari Web Extension Resources
        script: |
          set -e
          SRC="${SRCROOT}/StoryTrackerExtension/Resources"
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          ditto "${SRC}" "${DEST}"
        basedOnDependencyAnalysis: false
    settings:
      base:
        MARKETING_VERSION: "1.5.18"
        CURRENT_PROJECT_VERSION: "30"
        PRODUCT_NAME: StoryTrackerExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.personalos.story-tracker.extension
        INFOPLIST_FILE: StoryTrackerExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: StoryTrackerExtension/StoryTrackerExtension.entitlements
        SKIP_INSTALL: YES
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: __CI_EXTENSION_PROVISIONING_PROFILE__
          DEVELOPMENT_TEAM: __CI_TEAM_ID__
    dependencies: []

schemes:
  PersonalOS:
    build:
      targets:
        PersonalOS: all
    run:
      config: Debug
    archive:
      config: Release

configs:
  Debug: debug
  Release: release
