# Local development — Postgres + API + Frontend only.
# Production: use Jenkinsfile (docker run + Traefik/Kong/SeaweedFS from fash stack).
# No Nginx, no MinIO — reuse fash Traefik + Kong + SeaweedFS on VPS.

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: personal-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-personalos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-personalos}
      POSTGRES_DB: ${POSTGRES_DB:-personalos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-personalos}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - personal-os-net

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: personal-os-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-personalos}:${POSTGRES_PASSWORD:-personalos}@postgres:5432/${POSTGRES_DB:-personalos}?sslmode=disable
      POSTGRES_DATABASE_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      - personal-os-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-personal-os.fashandcurious.com/api/v1}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    container_name: personal-os-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${FE_PORT:-3000}:3000"
    networks:
      - personal-os-net

volumes:
  postgres_data:

networks:
  personal-os-net:
    driver: bridge
