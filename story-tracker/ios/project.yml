name: StoryTracker
options:
  bundleIdPrefix: com.personalos
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "2"

targets:
  StoryTracker:
    type: application
    platform: iOS
    sources:
      - path: StoryTrackerApp
        excludes:
          - Resources/**
    preBuildScripts:
      - name: Validate iOS app web resources
        script: |
          set -e
          SRC="${SRCROOT}/StoryTrackerApp/Resources"
          if [ ! -f "${SRC}/index.html" ]; then
            echo "error: missing ${SRC}/index.html — run npm run build:ios-app && npm run sync:ios-app"
            exit 1
          fi
        basedOnDependencyAnalysis: false
    postCompileScripts:
      - name: Copy iOS app web resources
        script: |
          set -e
          SRC="${SRCROOT}/StoryTrackerApp/Resources"
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          ditto "${SRC}" "${DEST}"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_NAME: Story Tracker
        PRODUCT_BUNDLE_IDENTIFIER: com.personalos.story-tracker
        INFOPLIST_FILE: StoryTrackerApp/Info.plist
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: __CI_PROVISIONING_PROFILE__
          DEVELOPMENT_TEAM: __CI_TEAM_ID__
    dependencies:
      - target: StoryTrackerExtension
        embed: true
    scheme:
      testTargets: []

  StoryTrackerExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: StoryTrackerExtension
        excludes:
          - Resources/**
    preBuildScripts:
      - name: Validate Safari Resources
        script: |
          set -e
          SRC="${SRCROOT}/StoryTrackerExtension/Resources"
          if [ ! -f "${SRC}/manifest.json" ]; then
            echo "error: missing ${SRC}/manifest.json — run npm run build:safari && npm run sync:safari-ios"
            exit 1
          fi
        basedOnDependencyAnalysis: false
    postCompileScripts:
      - name: Copy Safari Web Extension Resources
        script: |
          set -e
          SRC="${SRCROOT}/StoryTrackerExtension/Resources"
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          ditto "${SRC}" "${DEST}"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_NAME: StoryTrackerExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.personalos.story-tracker.extension
        INFOPLIST_FILE: StoryTrackerExtension/Info.plist
        SKIP_INSTALL: YES
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: __CI_EXTENSION_PROVISIONING_PROFILE__
          DEVELOPMENT_TEAM: __CI_TEAM_ID__
    dependencies: []

schemes:
  StoryTracker:
    build:
      targets:
        StoryTracker: all
    run:
      config: Debug
    archive:
      config: Release

configs:
  Debug: debug
  Release: release
