# Archive + export IPA for App Store / TestFlight (standalone story-tracker repo).
# Secrets: docs/CI-IOS.md
name: iOS Release

on:
  workflow_dispatch:
    inputs:
      upload_testflight:
        description: Upload IPA to TestFlight
        required: false
        default: true
        type: boolean
  push:
    branches:
      - "release/**"
      - "releases/**"
    tags:
      - "ios/v*"

concurrency:
  group: ios-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  UPLOAD_TESTFLIGHT: >-
    ${{
      (github.event_name == 'workflow_dispatch' && inputs.upload_testflight) ||
      (github.event_name == 'push' && (
        startsWith(github.ref, 'refs/heads/releases/') ||
        startsWith(github.ref, 'refs/heads/release/')
      ))
    }}

jobs:
  preflight:
    name: Preflight (billing reminder)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Billing & macOS runner
        run: |
          {
            echo "### Story Tracker iOS Release"
            echo "- Private repo needs **paid GitHub Actions** minutes for \`macos-14\`."
            echo "- If macOS job shows *payments have failed* or *spending limit*: [GitHub Billing](https://github.com/settings/billing) → fix payment → **Re-run workflow**."
            echo "- Secrets checklist: \`docs/CI-IOS.md\` (10 secrets incl. 2 profile base64)."
          } >> "${GITHUB_STEP_SUMMARY}"

  release:
    name: Archive & export IPA
    needs: preflight
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build Safari extension + sync iOS Resources
        run: |
          npm run build:safari
          npm run sync:safari-ios

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Verify signing secrets
        env:
          CERT_B64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERT_PW: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          EXT_PROFILE_B64: ${{ secrets.IOS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
          APP_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
          EXT_PROFILE_NAME: ${{ secrets.IOS_EXTENSION_PROVISIONING_PROFILE_SPECIFIER }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=0
          for name in CERT_B64 CERT_PW PROFILE_B64 EXT_PROFILE_B64 APP_PROFILE_NAME EXT_PROFILE_NAME TEAM_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub secret for ${name}. See docs/CI-IOS.md"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Patch release signing
        working-directory: ios
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
          EXT_PROFILE_NAME: ${{ secrets.IOS_EXTENSION_PROVISIONING_PROFILE_SPECIFIER }}
        run: bash scripts/ci_patch_release_signing.sh "${TEAM_ID}" "${APP_PROFILE_NAME}" "${EXT_PROFILE_NAME}"

      - name: Read expected app version
        id: app_version
        working-directory: ios
        run: |
          set -euo pipefail
          MARKETING="$(grep 'MARKETING_VERSION:' project.yml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          BUILD="$(grep 'CURRENT_PROJECT_VERSION:' project.yml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "marketing=${MARKETING}" >> "${GITHUB_OUTPUT}"
          echo "build=${BUILD}" >> "${GITHUB_OUTPUT}"

      - name: Prepare Xcode project
        working-directory: ios
        run: bash scripts/ci_ios_prepare.sh

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}

      - name: Install app provisioning profile
        working-directory: ios
        env:
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: bash scripts/ci_install_provisioning_profile.sh "${PROFILE_B64}" story-tracker-app

      - name: Install extension provisioning profile
        working-directory: ios
        env:
          EXT_PROFILE_B64: ${{ secrets.IOS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
        run: bash scripts/ci_install_provisioning_profile.sh "${EXT_PROFILE_B64}" story-tracker-extension

      - name: Verify provisioning profiles (bundle IDs)
        working-directory: ios
        env:
          APP_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
          EXT_PROFILE_NAME: ${{ secrets.IOS_EXTENSION_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          set -euo pipefail
          bash scripts/ci_verify_provisioning_profile.sh \
            "${RUNNER_TEMP}/story-tracker-app.mobileprovision" \
            "com.personalos.story-tracker" \
            "${APP_PROFILE_NAME}"
          bash scripts/ci_verify_provisioning_profile.sh \
            "${RUNNER_TEMP}/story-tracker-extension.mobileprovision" \
            "com.personalos.story-tracker.extension" \
            "${EXT_PROFILE_NAME}"

      - name: Archive (iphoneos)
        id: archive
        working-directory: ios
        env:
          ARCHIVE_PATH: build/StoryTracker.xcarchive
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild archive \
            -project StoryTracker.xcodeproj \
            -scheme StoryTracker \
            -configuration Release \
            -archivePath "${ARCHIVE_PATH}" \
            -destination 'generic/platform=iOS' \
            | tee xcodebuild-archive.log

      - name: Prepare ExportOptions.plist
        working-directory: ios
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
          EXT_PROFILE_NAME: ${{ secrets.IOS_EXTENSION_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          set -euo pipefail
          sed -e "s|TEAM_ID_PLACEHOLDER|${TEAM_ID}|g" \
              -e "s|APP_PROFILE_NAME_PLACEHOLDER|${APP_PROFILE_NAME}|g" \
              -e "s|EXT_PROFILE_NAME_PLACEHOLDER|${EXT_PROFILE_NAME}|g" \
              Config/ExportOptions-AppStore.plist > build/ExportOptions.plist

      - name: Export App Store IPA
        working-directory: ios
        env:
          ARCHIVE_PATH: build/StoryTracker.xcarchive
          EXPORT_DIR: build/export
        run: |
          set -o pipefail
          rm -rf "${EXPORT_DIR}"
          mkdir -p "${EXPORT_DIR}"
          xcodebuild -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportPath "${EXPORT_DIR}" \
            -exportOptionsPlist build/ExportOptions.plist \
            | tee xcodebuild-export.log

      - name: Normalize IPA path
        working-directory: ios
        run: |
          set -euo pipefail
          FOUND="$(find build/export -maxdepth 1 -name '*.ipa' | head -1)"
          test -n "${FOUND}"
          cp "${FOUND}" build/StoryTracker.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: story-tracker-ios-ipa-${{ github.run_number }}
          path: ios/build/StoryTracker.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Verify App Store Connect secrets
        if: env.UPLOAD_TESTFLIGHT == 'true'
        env:
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in ISSUER_ID API_KEY_ID API_PRIVATE_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub secret for ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Upload to TestFlight
        id: upload-testflight
        if: env.UPLOAD_TESTFLIGHT == 'true'
        working-directory: ios
        env:
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: bash scripts/ci_upload_testflight.sh build/StoryTracker.ipa

      - name: Print xcodebuild errors
        if: failure()
        working-directory: ios
        run: |
          set +euo pipefail
          for log in xcodebuild-archive.log xcodebuild-export.log; do
            [[ -f "${log}" ]] || continue
            echo "::group::${log}"
            grep -iE 'error:|ARCHIVE FAILED|BUILD FAILED|exportArchive FAILED|Code Sign error' "${log}" \
              | grep -v ': warning:' | tail -80 || true
            echo "::endgroup::"
          done

      - name: Release summary
        if: always() && steps.app_version.outcome == 'success'
        run: |
          echo "### Story Tracker iOS release" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Version: **${{ steps.app_version.outputs.marketing }} (${{ steps.app_version.outputs.build }})**" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Archive: **${{ steps.archive.outcome }}**" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Bundle: \`com.personalos.story-tracker\` + extension \`.extension\`" >> "${GITHUB_STEP_SUMMARY}"
