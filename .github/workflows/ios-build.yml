# Personal OS iOS — Simulator compile (monorepo)
name: iOS Build

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "ios/**"
      - "story-tracker/**"
      - "frontend/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - "ios/**"
      - "story-tracker/**"
      - "frontend/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight (billing reminder)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Billing note
        run: |
          echo "### Personal OS iOS Build" >> "${GITHUB_STEP_SUMMARY}"
          echo "macOS runner requires GitHub billing for private repos: https://github.com/settings/billing" >> "${GITHUB_STEP_SUMMARY}"

  build:
    name: Build PersonalOS (Simulator)
    needs: preflight
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: story-tracker/package-lock.json

      - name: Install story-tracker dependencies
        working-directory: story-tracker
        run: npm ci

      - name: Build Safari extension + auth bridge → ios/
        working-directory: story-tracker
        run: |
          npm run build:safari
          npm run sync:safari-ios
          npm run build:ios-bridge
          npm run sync:ios-bridge

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Prepare Xcode project
        working-directory: ios
        run: bash scripts/ci_ios_prepare.sh

      - name: Build for iOS Simulator
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project PersonalOS.xcodeproj \
            -scheme PersonalOS \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -derivedDataPath DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log

      - name: Package simulator app
        working-directory: ios
        run: |
          APP="$(find DerivedData/Build/Products -type d -name 'Personal OS.app' -path '*iphonesimulator*' | head -1)"
          if [[ -z "${APP}" ]]; then
            echo "Personal OS.app (simulator) not found"
            find DerivedData/Build/Products -maxdepth 3 -type d 2>/dev/null || true
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "${APP}" "PersonalOS-Simulator.zip"

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: personal-os-ios-simulator-${{ github.run_number }}
          path: ios/PersonalOS-Simulator.zip
          retention-days: 14
          if-no-files-found: error

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: personal-os-xcodebuild-log-${{ github.run_number }}
          path: ios/xcodebuild.log
          retention-days: 7
